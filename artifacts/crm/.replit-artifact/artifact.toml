kind = "web"
previewPath = "/"
title = "Employer Engagement CRM"
version = "1.0.0"
id = "artifacts/crm"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 3000

[services.development]
run = "PORT=3000 BASE_PATH=/ pnpm --filter @workspace/crm run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/crm", "run", "build" ]
publicDir = "artifacts/crm/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "3000"
BASE_PATH = "/"
