name: Deploy to Azure Container Apps

on:
  workflow_dispatch:
  push:
    branches: [master, main]

permissions:
  contents: read

env:
  RESOURCE_GROUP: Dev_Team_Data
  ACR_NAME: skills4crmacr07b768
  ACR_LOGIN_SERVER: skills4crmacr07b768.azurecr.io
  API_APP_NAME: skills4crm-api-07b768
  WEB_APP_NAME: skills4crm-web-07b768
  MIGRATION_JOB_NAME: skills4crm-migrate-07b768
  AZURE_SUBSCRIPTION_ID: 51a49afe-7232-459a-a7e3-411f4d5b9a37

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Preflight Azure credentials secret is present
        env:
          AZURE_CREDENTIALS: ${{ secrets.AZURE_CREDENTIALS }}
        run: |
          if [ -z "$AZURE_CREDENTIALS" ]; then
            echo "AZURE_CREDENTIALS is empty or not available to this workflow."
            exit 1
          fi

      - name: Preflight Azure credentials JSON shape
        env:
          AZURE_CREDENTIALS: ${{ secrets.AZURE_CREDENTIALS }}
        run: |
          node -e '
            const raw = process.env.AZURE_CREDENTIALS;
            let parsed;
            try {
              parsed = JSON.parse(raw);
            } catch {
              console.error("AZURE_CREDENTIALS is not valid JSON.");
              process.exit(1);
            }

            const normalized = {
              clientId: parsed.clientId ?? parsed.appId,
              clientSecret: parsed.clientSecret ?? parsed.password,
              tenantId: parsed.tenantId ?? parsed.tenant,
              subscriptionId: parsed.subscriptionId ?? process.env.AZURE_SUBSCRIPTION_ID,
            };

            const required = ["clientId", "clientSecret", "tenantId", "subscriptionId"];
            const missing = required.filter((key) => !parsed[key]);
            const normalizedMissing = required.filter((key) => !normalized[key]);
            if (normalizedMissing.length > 0) {
              console.error(`AZURE_CREDENTIALS is missing required field(s): ${normalizedMissing.join(", ")}`);
              process.exit(1);
            }

            console.log("AZURE_CREDENTIALS can be normalized to a service principal login shape.");
          '

      - name: Normalize Azure credentials
        env:
          AZURE_CREDENTIALS: ${{ secrets.AZURE_CREDENTIALS }}
        run: |
          node -e '
            const fs = require("fs");
            const parsed = JSON.parse(process.env.AZURE_CREDENTIALS);
            const normalized = {
              clientId: parsed.clientId ?? parsed.appId,
              clientSecret: parsed.clientSecret ?? parsed.password,
              tenantId: parsed.tenantId ?? parsed.tenant,
              subscriptionId: parsed.subscriptionId ?? process.env.AZURE_SUBSCRIPTION_ID,
            };
            for (const value of Object.values(normalized)) {
              console.log(`::add-mask::${value}`);
            }
            fs.appendFileSync(process.env.GITHUB_ENV, `AZURE_CLIENT_ID=${normalized.clientId}\n`);
            fs.appendFileSync(process.env.GITHUB_ENV, `AZURE_CLIENT_SECRET=${normalized.clientSecret}\n`);
            fs.appendFileSync(process.env.GITHUB_ENV, `AZURE_TENANT_ID=${normalized.tenantId}\n`);
            fs.appendFileSync(process.env.GITHUB_ENV, `AZURE_SUBSCRIPTION_ID=${normalized.subscriptionId}\n`);
          '

      - name: Azure service principal login
        run: |
          az login \
            --service-principal \
            --username "$AZURE_CLIENT_ID" \
            --password "$AZURE_CLIENT_SECRET" \
            --tenant "$AZURE_TENANT_ID"

      - name: Select Azure subscription
        run: |
          az account set --subscription "$AZURE_SUBSCRIPTION_ID"
          az account show --query "{subscription:id, tenant:tenantId}" --output table

      - name: Resolve deployed API URL
        id: api
        run: |
          fqdn=$(az containerapp show \
            --resource-group "$RESOURCE_GROUP" \
            --name "$API_APP_NAME" \
            --query properties.configuration.ingress.fqdn \
            --output tsv)
          echo "url=https://$fqdn" >> "$GITHUB_OUTPUT"

      - name: Build API image in ACR
        run: |
          az acr build \
            --registry "$ACR_NAME" \
            --image "skills4crm-api:${{ github.sha }}" \
            --file Dockerfile \
            .

      - name: Build migration image in ACR
        run: |
          az acr build \
            --registry "$ACR_NAME" \
            --image "skills4crm-migrate:${{ github.sha }}" \
            --file Dockerfile.migrate \
            .

      - name: Run database migrations
        run: |
          az containerapp job update \
            --resource-group "$RESOURCE_GROUP" \
            --name "$MIGRATION_JOB_NAME" \
            --image "$ACR_LOGIN_SERVER/skills4crm-migrate:${{ github.sha }}"

          execution_name=$(az containerapp job start \
            --resource-group "$RESOURCE_GROUP" \
            --name "$MIGRATION_JOB_NAME" \
            --query name \
            --output tsv)

          for attempt in $(seq 1 40); do
            status=$(az containerapp job execution show \
              --resource-group "$RESOURCE_GROUP" \
              --name "$MIGRATION_JOB_NAME" \
              --job-execution-name "$execution_name" \
              --query properties.status \
              --output tsv)

            echo "Migration status: $status"

            if [ "$status" = "Succeeded" ]; then
              exit 0
            fi

            if [ "$status" = "Failed" ] || [ "$status" = "Canceled" ]; then
              exit 1
            fi

            sleep 15
          done

          echo "Migration job timed out"
          exit 1

      - name: Deploy API image
        run: |
          az containerapp update \
            --resource-group "$RESOURCE_GROUP" \
            --name "$API_APP_NAME" \
            --image "$ACR_LOGIN_SERVER/skills4crm-api:${{ github.sha }}"

      - name: Build frontend image in ACR
        run: |
          az acr build \
            --registry "$ACR_NAME" \
            --image "skills4crm-web:${{ github.sha }}" \
            --file Dockerfile.frontend \
            --build-arg "VITE_API_BASE_URL=${{ steps.api.outputs.url }}" \
            .

      - name: Deploy frontend image
        run: |
          az containerapp update \
            --resource-group "$RESOURCE_GROUP" \
            --name "$WEB_APP_NAME" \
            --image "$ACR_LOGIN_SERVER/skills4crm-web:${{ github.sha }}"

      - name: Smoke test
        run: |
          api_status=$(curl --silent --output /dev/null --write-out "%{http_code}" "${{ steps.api.outputs.url }}/api/healthz")
          test "$api_status" = "200"

          web_fqdn=$(az containerapp show \
            --resource-group "$RESOURCE_GROUP" \
            --name "$WEB_APP_NAME" \
            --query properties.configuration.ingress.fqdn \
            --output tsv)
          web_status=$(curl --silent --output /dev/null --write-out "%{http_code}" "https://$web_fqdn/")
          test "$web_status" = "200"
