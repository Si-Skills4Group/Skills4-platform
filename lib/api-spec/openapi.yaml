openapi: 3.1.0
info:
  title: Skills4CRM API
  version: 0.2.0
  description: Employer Engagement CRM API — Skills4CRM
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication operations
  - name: users
    description: User operations
  - name: organisations
    description: Organisation (Account in D365) operations
  - name: contacts
    description: Contact operations
  - name: engagements
    description: Engagement (Opportunity) operations
  - name: tasks
    description: Task / Activity operations
  - name: dashboard
    description: Dashboard summary operations

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # --- Auth ---
  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Login with email and password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResponse"
        "401":
          description: Invalid credentials

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current authenticated user
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          description: Unauthenticated

  # --- Users ---
  /users:
    get:
      operationId: listUsers
      tags: [users]
      summary: List all users
      responses:
        "200":
          description: List of users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/User"

  /users/{id}:
    get:
      operationId: getUser
      tags: [users]
      summary: Get user by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: User
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "404":
          description: Not found
    put:
      operationId: updateUser
      tags: [users]
      summary: Update user (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateUserRequest"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  # --- Organisations ---
  /organisations:
    get:
      operationId: listOrganisations
      tags: [organisations]
      summary: List all organisations
      parameters:
        - name: search
          in: query
          schema:
            type: string
        - name: type
          in: query
          schema:
            type: string
        - name: sector
          in: query
          schema:
            type: string
        - name: region
          in: query
          schema:
            type: string
        - name: status
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of organisations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Organisation"
    post:
      operationId: createOrganisation
      tags: [organisations]
      summary: Create organisation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateOrganisationRequest"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Organisation"

  /organisations/{id}:
    get:
      operationId: getOrganisation
      tags: [organisations]
      summary: Get organisation by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Organisation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Organisation"
        "404":
          description: Not found
    put:
      operationId: updateOrganisation
      tags: [organisations]
      summary: Update organisation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateOrganisationRequest"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Organisation"
    delete:
      operationId: deleteOrganisation
      tags: [organisations]
      summary: Delete organisation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # --- Contacts ---
  /contacts:
    get:
      operationId: listContacts
      tags: [contacts]
      summary: List all contacts
      parameters:
        - name: search
          in: query
          schema:
            type: string
        - name: organisationId
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: List of contacts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Contact"
    post:
      operationId: createContact
      tags: [contacts]
      summary: Create contact
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateContactRequest"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Contact"

  /contacts/{id}:
    get:
      operationId: getContact
      tags: [contacts]
      summary: Get contact by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Contact
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Contact"
        "404":
          description: Not found
    put:
      operationId: updateContact
      tags: [contacts]
      summary: Update contact
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateContactRequest"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Contact"
    delete:
      operationId: deleteContact
      tags: [contacts]
      summary: Delete contact
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # --- Engagements ---
  /engagements:
    get:
      operationId: listEngagements
      tags: [engagements]
      summary: List all engagements
      parameters:
        - name: search
          in: query
          schema:
            type: string
        - name: stage
          in: query
          schema:
            type: string
        - name: status
          in: query
          schema:
            type: string
        - name: organisationId
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: List of engagements
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Engagement"
    post:
      operationId: createEngagement
      tags: [engagements]
      summary: Create engagement
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateEngagementRequest"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Engagement"

  /engagements/{id}:
    get:
      operationId: getEngagement
      tags: [engagements]
      summary: Get engagement by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Engagement
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Engagement"
        "404":
          description: Not found
    put:
      operationId: updateEngagement
      tags: [engagements]
      summary: Update engagement
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateEngagementRequest"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Engagement"
    delete:
      operationId: deleteEngagement
      tags: [engagements]
      summary: Delete engagement
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # --- Tasks ---
  /tasks:
    get:
      operationId: listTasks
      tags: [tasks]
      summary: List all tasks
      parameters:
        - name: search
          in: query
          schema:
            type: string
        - name: status
          in: query
          schema:
            type: string
        - name: priority
          in: query
          schema:
            type: string
        - name: organisationId
          in: query
          schema:
            type: integer
        - name: engagementId
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: List of tasks
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Task"
    post:
      operationId: createTask
      tags: [tasks]
      summary: Create task
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTaskRequest"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Task"

  /tasks/{id}:
    get:
      operationId: getTask
      tags: [tasks]
      summary: Get task by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Task
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Task"
        "404":
          description: Not found
    put:
      operationId: updateTask
      tags: [tasks]
      summary: Update task
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateTaskRequest"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Task"
    delete:
      operationId: deleteTask
      tags: [tasks]
      summary: Delete task
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # --- Dashboard ---
  /dashboard/summary:
    get:
      operationId: getDashboardSummary
      tags: [dashboard]
      summary: Get dashboard summary stats
      responses:
        "200":
          description: Summary stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardSummary"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    # --- Auth ---
    LoginRequest:
      type: object
      properties:
        email:
          type: string
        password:
          type: string
      required: [email, password]

    LoginResponse:
      type: object
      properties:
        token:
          type: string
        user:
          $ref: "#/components/schemas/User"
      required: [token, user]

    # --- User ---
    UserRole:
      type: string
      enum: [admin, crm_manager, engagement_user, read_only]

    User:
      type: object
      properties:
        id:
          type: integer
        fullName:
          type: string
        email:
          type: string
        role:
          $ref: "#/components/schemas/UserRole"
        isActive:
          type: boolean
        createdAt:
          type: string
        updatedAt:
          type: string
      required: [id, fullName, email, role, isActive, createdAt, updatedAt]

    UpdateUserRequest:
      type: object
      properties:
        fullName:
          type: string
        email:
          type: string
        role:
          $ref: "#/components/schemas/UserRole"
        isActive:
          type: boolean

    # --- Organisation ---
    OrganisationType:
      type: string
      enum: [employer, training_provider, partner]

    OrganisationStatus:
      type: string
      enum: [prospect, active, dormant, closed]

    Organisation:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        type:
          $ref: "#/components/schemas/OrganisationType"
        sector:
          type: string
        region:
          type: string
          nullable: true
        status:
          $ref: "#/components/schemas/OrganisationStatus"
        ownerUserId:
          type: integer
          nullable: true
        ownerName:
          type: string
          nullable: true
        website:
          type: string
          nullable: true
        phone:
          type: string
          nullable: true
        notes:
          type: string
          nullable: true
        contactCount:
          type: integer
        engagementCount:
          type: integer
        createdAt:
          type: string
        updatedAt:
          type: string
      required: [id, name, type, sector, status, contactCount, engagementCount, createdAt, updatedAt]

    CreateOrganisationRequest:
      type: object
      properties:
        name:
          type: string
        type:
          $ref: "#/components/schemas/OrganisationType"
        sector:
          type: string
        region:
          type: string
          nullable: true
        status:
          $ref: "#/components/schemas/OrganisationStatus"
        ownerUserId:
          type: integer
          nullable: true
        website:
          type: string
          nullable: true
        phone:
          type: string
          nullable: true
        notes:
          type: string
          nullable: true
      required: [name, type, sector, status]

    UpdateOrganisationRequest:
      type: object
      properties:
        name:
          type: string
        type:
          $ref: "#/components/schemas/OrganisationType"
        sector:
          type: string
        region:
          type: string
          nullable: true
        status:
          $ref: "#/components/schemas/OrganisationStatus"
        ownerUserId:
          type: integer
          nullable: true
        website:
          type: string
          nullable: true
        phone:
          type: string
          nullable: true
        notes:
          type: string
          nullable: true

    # --- Contact ---
    PreferredContactMethod:
      type: string
      enum: [email, phone, post, no_preference]

    Contact:
      type: object
      properties:
        id:
          type: integer
        firstName:
          type: string
        lastName:
          type: string
        jobTitle:
          type: string
          nullable: true
        email:
          type: string
          nullable: true
        phone:
          type: string
          nullable: true
        preferredContactMethod:
          $ref: "#/components/schemas/PreferredContactMethod"
        organisationId:
          type: integer
          nullable: true
        organisationName:
          type: string
          nullable: true
        notes:
          type: string
          nullable: true
        createdAt:
          type: string
        updatedAt:
          type: string
      required: [id, firstName, lastName, createdAt, updatedAt]

    CreateContactRequest:
      type: object
      properties:
        firstName:
          type: string
        lastName:
          type: string
        jobTitle:
          type: string
          nullable: true
        email:
          type: string
          nullable: true
        phone:
          type: string
          nullable: true
        preferredContactMethod:
          $ref: "#/components/schemas/PreferredContactMethod"
        organisationId:
          type: integer
          nullable: true
        notes:
          type: string
          nullable: true
      required: [firstName, lastName]

    UpdateContactRequest:
      type: object
      properties:
        firstName:
          type: string
        lastName:
          type: string
        jobTitle:
          type: string
          nullable: true
        email:
          type: string
          nullable: true
        phone:
          type: string
          nullable: true
        preferredContactMethod:
          $ref: "#/components/schemas/PreferredContactMethod"
        organisationId:
          type: integer
          nullable: true
        notes:
          type: string
          nullable: true

    # --- Engagement ---
    EngagementStage:
      type: string
      enum: [lead, contacted, meeting_booked, proposal, active, won, dormant]

    EngagementStatus:
      type: string
      enum: [open, closed_won, closed_lost, on_hold]

    Engagement:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        organisationId:
          type: integer
          nullable: true
        organisationName:
          type: string
          nullable: true
        primaryContactId:
          type: integer
          nullable: true
        contactName:
          type: string
          nullable: true
        ownerUserId:
          type: integer
          nullable: true
        ownerName:
          type: string
          nullable: true
        stage:
          $ref: "#/components/schemas/EngagementStage"
        status:
          $ref: "#/components/schemas/EngagementStatus"
        expectedLearnerVolume:
          type: integer
          nullable: true
        expectedValue:
          type: number
          nullable: true
        probability:
          type: integer
          nullable: true
        lastContactDate:
          type: string
          nullable: true
        nextActionDate:
          type: string
          nullable: true
        nextActionNote:
          type: string
          nullable: true
        notes:
          type: string
          nullable: true
        createdAt:
          type: string
        updatedAt:
          type: string
      required: [id, title, stage, status, createdAt, updatedAt]

    CreateEngagementRequest:
      type: object
      properties:
        title:
          type: string
        organisationId:
          type: integer
          nullable: true
        primaryContactId:
          type: integer
          nullable: true
        ownerUserId:
          type: integer
          nullable: true
        stage:
          $ref: "#/components/schemas/EngagementStage"
        status:
          $ref: "#/components/schemas/EngagementStatus"
        expectedLearnerVolume:
          type: integer
          nullable: true
        expectedValue:
          type: number
          nullable: true
        probability:
          type: integer
          nullable: true
        lastContactDate:
          type: string
          nullable: true
        nextActionDate:
          type: string
          nullable: true
        nextActionNote:
          type: string
          nullable: true
        notes:
          type: string
          nullable: true
      required: [title, stage, status]

    UpdateEngagementRequest:
      type: object
      properties:
        title:
          type: string
        organisationId:
          type: integer
          nullable: true
        primaryContactId:
          type: integer
          nullable: true
        ownerUserId:
          type: integer
          nullable: true
        stage:
          $ref: "#/components/schemas/EngagementStage"
        status:
          $ref: "#/components/schemas/EngagementStatus"
        expectedLearnerVolume:
          type: integer
          nullable: true
        expectedValue:
          type: number
          nullable: true
        probability:
          type: integer
          nullable: true
        lastContactDate:
          type: string
          nullable: true
        nextActionDate:
          type: string
          nullable: true
        nextActionNote:
          type: string
          nullable: true
        notes:
          type: string
          nullable: true

    # --- Task ---
    TaskStatus:
      type: string
      enum: [open, in_progress, completed, overdue]

    TaskPriority:
      type: string
      enum: [low, medium, high]

    Task:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        description:
          type: string
          nullable: true
        status:
          $ref: "#/components/schemas/TaskStatus"
        priority:
          $ref: "#/components/schemas/TaskPriority"
        dueDate:
          type: string
          nullable: true
        organisationId:
          type: integer
          nullable: true
        organisationName:
          type: string
          nullable: true
        engagementId:
          type: integer
          nullable: true
        engagementTitle:
          type: string
          nullable: true
        assignedUserId:
          type: integer
          nullable: true
        assignedUserName:
          type: string
          nullable: true
        createdAt:
          type: string
        updatedAt:
          type: string
      required: [id, title, status, priority, createdAt, updatedAt]

    CreateTaskRequest:
      type: object
      properties:
        title:
          type: string
        description:
          type: string
          nullable: true
        status:
          $ref: "#/components/schemas/TaskStatus"
        priority:
          $ref: "#/components/schemas/TaskPriority"
        dueDate:
          type: string
          nullable: true
        organisationId:
          type: integer
          nullable: true
        engagementId:
          type: integer
          nullable: true
        assignedUserId:
          type: integer
          nullable: true
      required: [title, status, priority]

    UpdateTaskRequest:
      type: object
      properties:
        title:
          type: string
        description:
          type: string
          nullable: true
        status:
          $ref: "#/components/schemas/TaskStatus"
        priority:
          $ref: "#/components/schemas/TaskPriority"
        dueDate:
          type: string
          nullable: true
        organisationId:
          type: integer
          nullable: true
        engagementId:
          type: integer
          nullable: true
        assignedUserId:
          type: integer
          nullable: true

    # --- Dashboard ---
    DashboardSummary:
      type: object
      properties:
        totalOrganisations:
          type: integer
        totalContacts:
          type: integer
        totalEngagements:
          type: integer
        openTasks:
          type: integer
        overdueTasks:
          type: integer
        engagementsByStage:
          type: array
          items:
            type: object
            properties:
              stage:
                type: string
              count:
                type: integer
            required: [stage, count]
        recentEngagements:
          type: array
          items:
            $ref: "#/components/schemas/Engagement"
        upcomingTasks:
          type: array
          items:
            $ref: "#/components/schemas/Task"
      required: [totalOrganisations, totalContacts, totalEngagements, openTasks, overdueTasks, engagementsByStage, recentEngagements, upcomingTasks]
